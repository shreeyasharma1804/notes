"bootstrap.servers": ""
"group.id": "my-consumer-group"

# Where to start reading if no committed offset exists for this group:
"auto.offset.reset": "earliest"

"enable.auto.commit": False

# How often the background thread sends a heartbeat to the group coordinator.
"heartbeat.interval.ms": 10000

# If heartbeats stop arriving within session.timeout.ms, the coordinator declares the consumer dead and triggers a rebalance.
"session.timeout.ms": 30000

# Max time between poll() calls before the consumer is considered dead
"max.poll.interval.ms": 300000

# Minimum bytes the broker will wait to accumulate before responding.
"fetch.min.bytes": 1

# Maximum bytes returned per partition per fetch request.
"max.partition.fetch.bytes": 1048576
