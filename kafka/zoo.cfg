tickTime=2000 (Baseline time unit)
initLimit=10 (The number of ticks that the initial synchronization phase can take after leader election)
syncLimit=5 (Heartbeat sent between zookeeper nodes at syncLimit*tickTime)

dataDir= (znode snapstore location)
dataLogDir= (znode transaction store location)

secureClientPort=2181

server.1=host1:2889:3889
server.2=host2:2889:3889
server.3=host3:2889:3889

autopurge.snapRetainCount=9 (The number of snapshots to retain)
autopurge.purgeInterval=24

maxClientCnxns=0 (Unlimited client connections to zookeeper)
ssl.keyStore.type=JKS
ssl.keyStore.location=
ssl.keyStore.password=
ssl.trustStore.type=JKS
ssl.trustStore.location=
ssl.trustStore.password=changeit

admin.enableServer=false

quorum.auth.enableSasl=true
quorum.auth.learnerRequireSasl=true
quorum.auth.serverRequireSasl=true

quorum.auth.learner.loginContext=QuorumLearner
quorum.auth.server.loginContext=QuorumServer


authProvider.1=org.apache.zookeeper.server.auth.SASLAuthenticationProvider
jaasLoginRenew=3600000
requireClientAuthScheme=sasl
